name: Minecraft Simple Start
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-mc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Run Server
        run: |
          cd SERVER
          echo "eula=true" > eula.txt
          
          # Memory 12GB rakhte hain taaki crash na ho
          java -Xmx12G -Xms12G -jar server.jar nogui