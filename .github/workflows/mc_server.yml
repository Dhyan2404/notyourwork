name: Minecraft 24-7 Action
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante mein auto-restart

jobs:
  run-mc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Install Playit
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/playit.gpg
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://playit-cloud.github.io/ppa/data ./ " | sudo tee /etc/apt/sources.list.d/playit-cloud.list
          sudo apt update && sudo apt install playit -y

      - name: Run Server & Auto-Save
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          # 1. Folder ke andar jao (Apne folder ka sahi naam yahan check karo)
          cd SERVER
          
          # 2. Config setup
          echo "$PLAYIT_SECRET" > playit.toml
          echo "eula=true" > eula.txt
          
          # 3. Background loop for Auto-Save to GitHub
          while true; do
            sleep 1800
            git config --global user.name "Dhyan-Bot"
            git config --global user.email "bot@github.com"
            git add .
            git commit -m "Auto-save world: $(date)" || echo "No changes"
            git push
          done &

          # 4. Start Server with 12GB RAM (16GB machine)
          java -Xmx14G -Xms12G -jar server.jar nogui & playit run